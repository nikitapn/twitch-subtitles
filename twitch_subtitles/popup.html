<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 320px;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0e0e10;
            color: #efeff1;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #464649;
        }

        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #9146ff;
        }

        .status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 12px;
            background: #18181b;
            border-radius: 8px;
        }

        .status-text {
            font-weight: 500;
        }

        .status.active {
            background: #1f4e3d;
            border: 1px solid #00f5c4;
        }

        .status.inactive {
            background: #3a2434;
            border: 1px solid #bf94ff;
        }

        .toggle-btn {
            background: #9146ff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .toggle-btn:hover {
            background: #7c3aed;
        }

        .toggle-btn.active {
            background: #00f5c4;
            color: #0e0e10;
        }

        .settings {
            margin-top: 20px;
        }

        .setting-group {
            margin-bottom: 16px;
        }

        .setting-label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        .setting-input, .setting-select {
            width: 100%;
            padding: 8px;
            border: 1px solid #464649;
            border-radius: 4px;
            background: #18181b;
            color: #efeff1;
            font-size: 14px;
            box-sizing: border-box;
        }

        .setting-input:focus, .setting-select:focus {
            outline: none;
            border-color: #9146ff;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox {
            width: 16px;
            height: 16px;
        }

        .language-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .lang-btn {
            padding: 6px 8px;
            border: 1px solid #464649;
            background: #18181b;
            color: #efeff1;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            border-color: #9146ff;
        }

        .lang-btn.active {
            background: #9146ff;
            border-color: #9146ff;
            color: white;
        }

        .error {
            background: #ff4444;
            color: white;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .info {
            font-size: 12px;
            color: #adadb8;
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #464649;
        }

        .preview {
            background: #18181b;
            border: 1px solid #464649;
            border-radius: 4px;
            padding: 12px;
            margin-top: 8px;
            text-align: center;
            position: relative;
        }

        .preview-text {
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 4px;
            display: inline-block;
            font-size: 18px;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .history-header .setting-label {
            margin-bottom: 0;
        }

        .clear-btn {
            background: transparent;
            color: #adadb8;
            border: 1px solid #464649;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .clear-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .history-box {
            max-height: 180px;
            overflow-y: auto;
            background: #18181b;
            border: 1px solid #464649;
            border-radius: 4px;
            padding: 8px;
        }

        .history-empty {
            color: #adadb8;
            font-size: 13px;
            text-align: center;
            padding: 8px 0;
        }

        .history-entry {
            padding: 6px 0;
            border-bottom: 1px solid #2a2a2d;
            font-size: 13px;
        }

        .history-entry:last-child {
            border-bottom: none;
        }

        .history-entry .history-time {
            color: #adadb8;
            font-size: 11px;
            margin-right: 6px;
        }

        .history-entry .history-original {
            color: #adadb8;
            font-size: 12px;
            font-style: italic;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 Twitch Subtitles</h1>
    </div>

    <div id="error-message" class="error" style="display: none;"></div>

    <div id="status" class="status inactive">
        <span class="status-text">Subtitles: Inactive</span>
        <button id="toggle-btn" class="toggle-btn">Enable</button>
    </div>

    <div class="setting-group">
        <div class="history-header">
            <label class="setting-label">Transcript History</label>
            <button id="clear-history-btn" class="clear-btn">Clear</button>
        </div>
        <div id="history-box" class="history-box">
            <div class="history-empty">No subtitles yet</div>
        </div>
    </div>

    <div class="settings">
        <div class="setting-group">
            <div class="checkbox-group">
                <input type="checkbox" id="translation-enabled" class="checkbox" checked>
                <label for="translation-enabled" class="setting-label">Enable Translation</label>
            </div>
        </div>

        <div class="setting-group">
            <label class="setting-label">Translation Provider</label>
            <select id="translation-provider" class="setting-select">
                <option value="ollama">Ollama (local, no rate limit)</option>
                <option value="mymemory">MyMemory (online API)</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Target Language</label>
            <select id="target-language" class="setting-select">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
                <option value="ru">Russian</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Source Language Hint</label>
            <select id="source-language-hint" class="setting-select">
                <option value="">Auto-detect</option>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="pl">Polish</option>
                <option value="cs">Czech</option>
                <option value="sk">Slovak</option>
                <option value="ru">Russian</option>
                <option value="uk">Ukrainian</option>
                <option value="nl">Dutch</option>
                <option value="sv">Swedish</option>
                <option value="tr">Turkish</option>
                <option value="ar">Arabic</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="zh">Chinese</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Font Size</label>
            <select id="font-size" class="setting-select">
                <option value="14px">Small</option>
                <option value="18px" selected>Medium</option>
                <option value="22px">Large</option>
                <option value="28px">Extra Large</option>
            </select>
        </div>

        <div class="setting-group">
            <label class="setting-label">Text Color</label>
            <input type="color" id="text-color" class="setting-input" value="#ffffff">
        </div>

        <div class="setting-group">
            <label class="setting-label">Background Opacity</label>
            <input type="range" id="bg-opacity" class="setting-input" min="0" max="100" value="80">
        </div>

        <div class="setting-group">
            <label class="setting-label">Preview</label>
            <div class="preview">
                <div id="preview-text" class="preview-text">Sample subtitle text</div>
            </div>
        </div>

        <div class="setting-group">
            <label class="setting-label">Ollama Server URL</label>
            <input type="text" id="ollama-base-url" class="setting-input" placeholder="http://localhost:11434">
        </div>

        <div class="setting-group">
            <label class="setting-label">Ollama Model</label>
            <input type="text" id="ollama-model" class="setting-input" placeholder="gemma4:e4b">
        </div>
    </div>

    <div class="info">
        Works on Twitch stream pages. Transcription runs locally via
        <a href="https://ollama.com" target="_blank" style="color:#9146ff;">Ollama</a> —
        run <code>OLLAMA_ORIGINS="chrome-extension://*" ollama serve</code> and
        <code>ollama pull gemma4:e4b</code> first.
    </div>

    <script src="popup.js"></script>
</body>
</html>
